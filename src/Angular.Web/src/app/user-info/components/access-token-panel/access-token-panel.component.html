<div class="border-b border-gray-200 bg-white tablet:px-4 py-5 px-6">
  <div class="mt-4 ml-4 flex flex-wrap items-center justify-between sm:flex-nowrap">
    <div class="mt-4 ml-4">
      <h3 class="text-base font-semibold text-gray-900">Access Token</h3>
    </div>
    <div class="mt-4 ml-4 shrink-0 gap-2 flex">
      <button (click)="showAccessToken()" type="button"
              class="relative inline-flex items-center rounded-md bg-zinc-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-zinc-500 focus-visible:outline-2 focus-visible:outline-offset-2">
        Show Access Token
      </button>
      <button (click)="decodeAccessToken()" type="button"
              class="relative inline-flex items-center rounded-md bg-zinc-300 px-3 py-2 text-sm font-semibold text-zinc-800 shadow-xs hover:bg-zinc-200 focus-visible:outline-2 focus-visible:outline-offset-2 disabled:opacity-50"
              [disabled]="!accessToken()">
        Decode Access Token
      </button>
      <button (click)="clearAccessToken()" type="button"
              class="relative inline-flex items-center rounded-md bg-red-500 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-red-400 focus-visible:outline-2 focus-visible:outline-offset-2 ">
        Clear Access Token
      </button>
      <button (click)="copyAccessToken()" type="button"
              class="relative inline-flex text-white items-center rounded-md bg-blue-800 px-3 py-2 text-sm font-semibold  shadow-xs hover:bg-blue-600 focus-visible:outline-2 focus-visible:outline-offset-2 disabled:opacity-50"
              [disabled]="!accessToken()">
        Copy Access Token
      </button>
    </div>
  </div>
  <div class="min-h-[600px] max-h-[600px] border-zinc-800 border p-8 mt-4 break-all overflow-y-auto">
    <p *ngIf="showingAccessToken()">{{ accessToken() }}</p>
    <pre *ngIf="showingDecodedToken()">{{ decodedToken() }}</pre>
  </div>
</div>
